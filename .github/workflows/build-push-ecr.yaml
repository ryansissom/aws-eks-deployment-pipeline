name: Build and Push to ECR

on:
  workflow_dispatch:

permissions:
  contents: write
env:
  AWS_REGION: us-east-1                       
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
        
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      - name: Update deployment image tag
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i "s|image: .*my-app:.*|image: 058264082349.dkr.ecr.us-east-1.amazonaws.com/my-app:$IMAGE_TAG|g" kubernetes/apps/deployment.yaml      
      - name: Commit deployment update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kubernetes/apps/deployment.yaml
          git commit -m "Deploy image ${{ github.sha }}" || echo "No changes"
          git push